[project]
name = "datamaxi"
authors = [
  { name="Bisonai", email="business@bisonai.com" },
]
description = "Official Python SDK for DataMaxi+ API"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
   "Intended Audience :: Developers",
   "Intended Audience :: Financial and Insurance Industry",
   "License :: OSI Approved :: MIT License",
   "Programming Language :: Python :: 3.10",
   "Programming Language :: Python :: 3.11",
   "Programming Language :: Python :: 3.12",
   "Programming Language :: Python :: 3.13",
   "Programming Language :: Python :: 3.14",
]
dynamic = ["dependencies", "version"]

[project.optional-dependencies]
async = ["httpx>=0.27,<1"]

[tool.setuptools.dynamic]
dependencies = {file = ["requirements/common.txt"]}
version = {attr = "datamaxi.__version__.__version__"}

[project.urls]
Homepage = "https://github.com/bisonai/datamaxi-python"
Issues = "https://github.com/bisonai/datamaxi-python/issues"

[tool.black]
# datamaxi/_endpoints.py is generated by datamaxi-codegen; don't reformat it.
force-exclude = 'datamaxi/_endpoints\.py'
